      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Test Flask app
      run: python -c "from app import app; assert app is not None; print('✅ Test passed!')"

